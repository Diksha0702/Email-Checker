<!doctype html>
<html>
  <head>
    <title>Email Checker</title>
    <style>
      body {
        font-family: Arial;
        padding: 30px;
        background: #f4f6f8;
      }

      .container {
        background: white;
        padding: 20px;
        border-radius: 10px;
        max-width: 700px;
        margin: auto;
      }

      button {
        margin-top: 10px;
        padding: 10px 15px;
        cursor: pointer;
      }

      .valid {
        color: green;
      }
      .invalid {
        color: red;
      }
      .risky {
        color: orange;
      }
      .duplicate {
        color: purple;
      }

      table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 8px;
        border-bottom: 1px solid #ddd;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Email Checker Tool</h2>

      <input type="file" id="fileInput" />
      <br />
      <button onclick="uploadFile()">Upload & Check</button>

      <div id="summary"></div>

      <a id="downloadLink" style="display: none">
        <button>Download Cleaned Excel</button>
      </a>

      <table>
        <thead>
          <tr>
            <th>Row</th>
            <th>Email</th>
            <th>Status</th>
            <th>Reason</th>
            <th>Score</th>
          </tr>
        </thead>
        <tbody id="resultsTable"></tbody>
      </table>
    </div>

    <script>
      async function uploadFile() {
        let file = document.getElementById("fileInput").files[0];

        if (!file) {
          alert("Select file");
          return;
        }

        let formData = new FormData();
        formData.append("file", file);

        let res = await fetch("/upload", {
          method: "POST",
          body: formData,
        });

        if (!res.ok) {
          alert("Upload failed");
          return;
        }

        let data = await res.json();

        document.getElementById("summary").innerText =
          `Valid: ${data.summary.valid} | Invalid: ${data.summary.invalid} | Risky: ${data.summary.risky}`;

        if (data.download) {
          let link = document.getElementById("downloadLink");
          link.href = window.location.origin + data.download;
          link.style.display = "block";
        }

        let table = document.getElementById("resultsTable");
        table.innerHTML = "";

        data.results.forEach((r) => {
          let tr = document.createElement("tr");

          tr.innerHTML = `
            <td>${r.row}</td>
            <td>${r.email}</td>
            <td class="${r.status}">${r.status}</td>
            <td>${r.reason}</td>
            <td>${r.score}%</td>
          `;

          table.appendChild(tr);
        });
      }
    </script>
  </body>
</html>
